version: '3.9'

services:
  # Databases for each microservice
  mysql_auth:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  mysql_company:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: company_db
      MYSQL_USER: company_user
      MYSQL_PASSWORD: company_password
    volumes:
      - company_db_data:/var/lib/mysql

  mysql_seeker:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: seeker_db
      MYSQL_USER: seeker_user
      MYSQL_PASSWORD: seeker_password
    volumes:
      - seeker_db_data:/var/lib/mysql

  mysql_chat:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: chat_db
      MYSQL_USER: chat_user
      MYSQL_PASSWORD: chat_password
    volumes:
      - chat_db_data:/var/lib/mysql

  mysql_ai:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ai_db
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_password
    volumes:
      - ai_db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  auth-service:
    build: ./auth-service
    environment:
      - DB_HOST=mysql_auth
      - DB_NAME=auth_db
      - DB_USER=auth_user
      - DB_PASSWORD=auth_password
    depends_on:
      - mysql_auth

  company-service:
    build: ./company-service
    environment:
      - DB_HOST=mysql_company
      - DB_NAME=company_db
      - DB_USER=company_user
      - DB_PASSWORD=company_password
    depends_on:
      - mysql_company

  seeker-service:
    build: ./seeker-service
    environment:
      - DB_HOST=mysql_seeker
      - DB_NAME=seeker_db
      - DB_USER=seeker_user
      - DB_PASSWORD=seeker_password
    depends_on:
      - mysql_seeker

  chat-service:
    build: ./chat-service
    environment:
      - DB_HOST=mysql_chat
      - DB_NAME=chat_db
      - DB_USER=chat_user
      - DB_PASSWORD=chat_password
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mysql_chat
      - redis
    ports:
      - "8001:8001"

  ai-service:
    build: ./ai-service
    environment:
      - DB_HOST=mysql_ai
      - DB_NAME=ai_db
      - DB_USER=ai_user
      - DB_PASSWORD=ai_password
      - COMPANY_SERVICE_URL=http://company-service:8002/api/company
    depends_on:
      - mysql_ai
    ports:
      - "8004:8004"

  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - company-service
      - seeker-service
      - chat-service
      - ai-service

volumes:
  auth_db_data:
  company_db_data:
  seeker_db_data:
  chat_db_data:
  ai_db_data:
  redis_data:
